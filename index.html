<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Necessary Cookie Demo</title>

  <!-- Simulated necessary cookies -->
  <script>
    // Session cookie (common pattern)
    document.cookie = "PHPSESSID=xyz123abc; path=/; Secure; SameSite=Strict";

    // CSRF token cookie
    document.cookie = "csrftoken=secureToken987; path=/; Secure; SameSite=Strict";
  </script>
</head>
<body>
  <h1>Necessary Cookie Demo Page</h1>
  <p>This page sets cookies that mimic session and security needs.</p>

  <form>
    <label>Username: <input type="text" name="username"></label><br>
    <label>Password: <input type="password" name="password"></label><br>
    <button type="submit">Login</button>
  </form>

  <p><a href="https://www.seqrite.com/data-privacy">Powered by Seqrite</a></p>
</body>
</html>
